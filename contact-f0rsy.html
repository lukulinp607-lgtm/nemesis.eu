<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Kontakt - F0rsy</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0b0b0b;
            color: white;

            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .contact-card {
            width: 400px;
            padding: 30px;
            text-align: center;

            background: rgba(255,255,255,0.05);
            border: 1px solid orange;
            border-radius: 15px;

            box-shadow: 0 0 25px rgba(255,165,0,0.4);
        }

        h1 {
            color: orange;
        }

        .phone {
            font-size: 28px;
            font-weight: bold;
            margin: 20px 0;
        }

        .call-btn {
            display: inline-block;
            padding: 12px 20px;

            background: orange;
            color: black;

            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
        }

        .call-btn:hover {
            transform: scale(1.05);
        }

        .back-btn {
            display: block;
            margin-top: 20px;
            color: white;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="contact-card">

        <h1>📞 Kontakt na F0rsy</h1>

        <div class="phone">
            605 949 242
        </div>

        <a class="call-btn" href="tel:605949242">
            Zavolat
        </a>

        <a class="back-btn" href="roster.html">
            ← Zpět na soupisku
        </a>

    </div>

</body>
</html>
