<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nábor - CS2 Nemesis</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0b0b0b;
    color:white;
}

.container{
    max-width:700px;
    margin:auto;
    padding:40px 20px;
}

.card{
    background:rgba(255,255,255,0.05);
    border:1px solid orange;
    border-radius:15px;
    padding:30px;
    box-shadow:0 0 25px rgba(255,165,0,.25);
}

h1{
    text-align:center;
    color:orange;
}

input, select, textarea{
    width:100%;
    padding:12px;
    margin-top:10px;
    margin-bottom:15px;

    background:#151515;
    color:white;

    border:1px solid #333;
    border-radius:8px;
}

button{
    width:100%;
    padding:14px;

    background:orange;
    color:black;

    border:none;
    border-radius:8px;

    font-weight:bold;
    cursor:pointer;
}

button:hover{
    transform:scale(1.02);
}

.info{
    text-align:center;
    margin-bottom:20px;
}
</style>
</head>
<body>

<div class="container">

<div class="card">

<h1>🎯 Nábor do CS2 Nemesis</h1>

<div class="info">
Hledáme aktivní hráče pro soutěžní Counter-Strike 2.
</div>

<form>

<label>Nick</label>
<input type="text" placeholder="Tvůj herní nick">

<label>Steam profil</label>
<input type="text" placeholder="https://steamcommunity.com/...">

<label>FACEIT Level</label>
<select>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>
</select>

<label>Role</label>
<select>
<option>AWPer</option>
<option>Rifler</option>
<option>Entry Fragger</option>
<option>Support</option>
<option>IGL</option>
</select>

<label>O sobě</label>
<textarea rows="5"
placeholder="Napiš něco o sobě..."></textarea>

<button type="submit">
🚀 Odeslat přihlášku
</button>

</form>

</div>

</div>

</body>
</html>
